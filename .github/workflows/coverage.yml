name: 📊 API Coverage Report

on:
  pull_request:
    branches: [ main ]

permissions:
  pull-requests: write

jobs:
  coverage:
    runs-on: ubuntu-latest

    steps:
      - name: 🗂️ Checkout repository
        uses: actions/checkout@v4

      - name: ⚙️ Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: 🧩 Install & Build
        run: |
          npm ci
          npm run build

      - name: 📊 Generate & Post Coverage Table Report
        if: always()
        uses: actions/github-script@v7
        env:
          REPORT_FORMAT: 'table' 
        with:
          script: |
            const fs = require('fs');
            const cp = require('child_process');
            
            const config = {
              table: { flag: 'github-table', header: 'Table report' },
              plain: { flag: 'github-plain', header: 'Plain report' }
            }[process.env.REPORT_FORMAT];

            let coverageFailed = false;
            
            // 1. Run the script safely
            try {
              console.log(`Running coverage with format: ${config.flag}`);
              cp.execSync(`npx test-coverage --format=${config.flag}`, { stdio: 'inherit' });
            } catch (err) {
              console.log('⚠️ Coverage threshold not met. Preparing to post failure report...');
              coverageFailed = true;
            }

            // 2. Read the generated markdown
            const body = fs.readFileSync('test-coverage-report.md', 'utf-8');

            // 3. Ensure we are in a Pull Request before trying to comment
            if (context.issue.number) {
              const { data: comments } = await github.rest.issues.listComments({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
              });
              
              const existing = comments.find(c => 
                c.user.login === 'github-actions[bot]' && 
                c.body.includes(config.header)
              );

              const commentPayload = {
                owner: context.repo.owner,
                repo: context.repo.repo,
                body: body
              };

              if (existing) {
                await github.rest.issues.updateComment({ ...commentPayload, comment_id: existing.id });
              } else {
                await github.rest.issues.createComment({ ...commentPayload, issue_number: context.issue.number });
              }
              console.log('✅ Comment posted successfully.');
            } else {
              console.log('ℹ️ Not a Pull Request. Skipping comment creation.');
            }

            // 4. Fail the Action step if coverage was too low
            if (coverageFailed) {
              core.setFailed('API Coverage is below the required threshold.');
            }

      - name: 📊 Generate & Post Coverage Plain Report
        if: always()
        uses: actions/github-script@v7
        env:
          REPORT_FORMAT: 'plain' 
        with:
          script: |
            const fs = require('fs');
            const cp = require('child_process');
            
            const config = {
              table: { flag: 'github-table', header: 'Table report' },
              plain: { flag: 'github-plain', header: 'Plain report' }
            }[process.env.REPORT_FORMAT];

            let coverageFailed = false;
            
            // 1. Run the script safely
            try {
              console.log(`Running coverage with format: ${config.flag}`);
              cp.execSync(`npx test-coverage --format=${config.flag}`, { stdio: 'inherit' });
            } catch (err) {
              console.log('⚠️ Coverage threshold not met. Preparing to post failure report...');
              coverageFailed = true;
            }

            // 2. Read the generated markdown
            const body = fs.readFileSync('test-coverage-report.md', 'utf-8');

            // 3. Ensure we are in a Pull Request before trying to comment
            if (context.issue.number) {
              const { data: comments } = await github.rest.issues.listComments({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
              });
              
              const existing = comments.find(c => 
                c.user.login === 'github-actions[bot]' && 
                c.body.includes(config.header)
              );

              const commentPayload = {
                owner: context.repo.owner,
                repo: context.repo.repo,
                body: body
              };

              if (existing) {
                await github.rest.issues.updateComment({ ...commentPayload, comment_id: existing.id });
              } else {
                await github.rest.issues.createComment({ ...commentPayload, issue_number: context.issue.number });
              }
              console.log('✅ Comment posted successfully.');
            } else {
              console.log('ℹ️ Not a Pull Request. Skipping comment creation.');
            }

            // 4. Fail the Action step if coverage was too low
            if (coverageFailed) {
              core.setFailed('API Coverage is below the required threshold.');
            }