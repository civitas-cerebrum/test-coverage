name: 📊 API Coverage Report

on:
  pull_request:
    branches: [ main ]

permissions:
  pull-requests: write

jobs:
  coverage:
    runs-on: ubuntu-latest

    steps:
      - name: 🗂️ Checkout repository
        uses: actions/checkout@v4

      - name: ⚙️ Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: 🧩 Install & Build
          # Ensure you build the package so the CLI is available
        run: |
          npm ci
          npm run build

      - name: 📊 Generate & Post Table Report
        if: always()
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            // 1. Generate the report
            const exec = require('child_process').execSync;
            exec('npm run test:coverage -- --format=github-table');
            
            const body = fs.readFileSync('test-coverage-report.md', 'utf-8');

            // 2. Find existing TABLE comment 
            // We check for the hidden tag but make sure it's NOT the plain list
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });
            
            const existing = comments.find(c => 
              c.user.login === 'github-actions[bot]' && 
              c.body.includes('') &&
              !c.body.includes('View Detailed Plain List')
            );

            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner, repo: context.repo.repo,
                comment_id: existing.id, body
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner, repo: context.repo.repo,
                issue_number: context.issue.number, body
              });
            }

      - name: 📊 Generate & Post Plain Report
        if: always()
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            // 1. Generate the report
            const exec = require('child_process').execSync;
            exec('npm run test:coverage:plain -- --format=github-plain');
            
            const body = fs.readFileSync('test-coverage-report.md', 'utf-8');

            // 2. Find existing PLAIN comment
            // We look specifically for the summary text we added to the reporter
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });
            
            const existing = comments.find(c => 
              c.user.login === 'github-actions[bot]' && 
              c.body.includes('View Detailed Plain List')
            );

            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner, repo: context.repo.repo,
                comment_id: existing.id, body
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner, repo: context.repo.repo,
                issue_number: context.issue.number, body
              });
            }