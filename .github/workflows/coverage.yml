name: 📊 API Coverage Report

on:
  pull_request:
    branches: [ main ]

permissions:
  pull-requests: write

jobs:
  coverage:
    runs-on: ubuntu-latest

    steps:
      - name: 🗂️ Checkout repository
        uses: actions/checkout@v4

      - name: ⚙️ Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'

      - name: 🧩 Install & Build
        run: |
          npm ci
          npm run build

      - name: 📊 Generate Table Report
        run: |
          npm run test:coverage
          mv test-coverage-report.md table-report.md

      - name: 📊 Generate Plain Report
        run: |
          npm run test:coverage:plain
          mv test-coverage-report.md plain-report.md

      - name: 💬 Post Combined Coverage Comment
        uses: actions/github-script@v7
        if: always()
        with:
          script: |
            const fs = require('fs');
            
            // Read both generated markdown files
            const tableMd = fs.readFileSync('table-report.md', 'utf-8');
            const plainMd = fs.readFileSync('plain-report.md', 'utf-8');

            // Construct a single, sleek body
            // We wrap the plain report in a details tag to keep the PR clean
            const body = `
            ${tableMd}

            <details>
            <summary>🔍 View Detailed Plain List</summary>
            <br/>

            ${plainMd}
            </details>
            `.trim();

            // Find existing coverage comment using our hidden HTML tag
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });
            
            const existing = comments.find(c =>
              c.user.type === 'Bot' && c.body.includes('api-coverage-report')
            );

            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body,
              });
            }