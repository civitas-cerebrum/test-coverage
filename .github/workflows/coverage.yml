name: 📊 API Coverage Report

on:
  pull_request:
    branches: [ main ]

permissions:
  pull-requests: write

jobs:
  coverage:
    runs-on: ubuntu-latest

    steps:
      - name: 🗂️ Checkout repository
        uses: actions/checkout@v4

      - name: ⚙️ Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: 🧩 Install & Build
        run: |
          npm ci
          npm run build

      - name: 📊 Generate & Post Table Report
        if: always()
        uses: actions/github-script@v7
        env:
          REPORT_FORMAT: 'table'
        with:
          script: |
            const fs = require('fs');
            const cp = require('child_process');
            
            // 1. Configuration Enum/Mapping
            const config = {
              table: { flag: 'github-table', header: 'Table report', cmd: 'npm run test:coverage' },
              plain: { flag: 'github-plain', header: 'Plain report', cmd: 'npm run test:coverage:plain' }
            }[process.env.REPORT_FORMAT];

            // 2. Generate the report
            cp.execSync(`${config.cmd} -- --format=${config.flag}`);
            const body = fs.readFileSync('test-coverage-report.md', 'utf-8');

            // 3. Find and Update/Create comment
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });
            
            const existing = comments.find(c => 
              c.user.login === 'github-actions[bot]' && 
              c.body.includes(config.header)
            );

            const commentPayload = {
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: body
            };

            if (existing) {
              await github.rest.issues.updateComment({ ...commentPayload, comment_id: existing.id });
            } else {
              await github.rest.issues.createComment({ ...commentPayload, issue_number: context.issue.number });
            }

      - name: 📊 Generate & Post Plain Report
        if: always()
        uses: actions/github-script@v7
        env:
          REPORT_FORMAT: 'plain'
        with:
          script: |
            const fs = require('fs');
            const cp = require('child_process');
            
            const config = {
              table: { flag: 'github-table', header: 'Table report', cmd: 'npm run test:coverage' },
              plain: { flag: 'github-plain', header: 'Plain report', cmd: 'npm run test:coverage:plain' }
            }[process.env.REPORT_FORMAT];

            cp.execSync(`${config.cmd} -- --format=${config.flag}`);
            const body = fs.readFileSync('test-coverage-report.md', 'utf-8');

            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });
            
            const existing = comments.find(c => 
              c.user.login === 'github-actions[bot]' && 
              c.body.includes(config.header)
            );

            const commentPayload = {
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: body
            };

            if (existing) {
              await github.rest.issues.updateComment({ ...commentPayload, comment_id: existing.id });
            } else {
              await github.rest.issues.createComment({ ...commentPayload, issue_number: context.issue.number });
            }