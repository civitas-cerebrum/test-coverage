name: 📊 API Coverage Report

on:
  pull_request:
    branches: [ main ]

permissions:
  pull-requests: write

jobs:
  coverage:
    runs-on: ubuntu-latest

    steps:
      - name: 🗂️ Checkout repository
        uses: actions/checkout@v4

      - name: ⚙️ Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: 🧩 Install & Build
        run: |
          npm ci
          npm run build

      - name: 📊 Generate Table Report
        run: |
          npm run test:coverage -- --format=github-table
          mv test-coverage-report.md table-report.md

      - name: 📊 Generate Plain Report
        run: |
          npm run test:coverage:plain -- --format=github-plain
          mv test-coverage-report.md plain-report.md

      - name: 💬 Update PR Coverage Comment
        uses: actions/github-script@v7
        if: always()
        with:
          script: |
            const fs = require('fs');
            
            // 1. Load the data
            const tableMd = fs.readFileSync('table-report.md', 'utf-8');
            const plainMd = fs.readFileSync('plain-report.md', 'utf-8');

            // 2. Build the body - using a template that ensures MD renders correctly
            // We strip the hidden HTML tag from the second file to keep the body unique
            const cleanPlainMd = plainMd.replace('', '');
            
            const body = [
              tableMd,
              '',
              '<details>',
              '<summary>🔍 View Detailed Plain List</summary>',
              '<br/>',
              '',
              cleanPlainMd,
              '</details>'
            ].join('\n');

            // 3. Find the existing comment
            // We look specifically for the bot's login and our unique hidden tag
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });
            
            const botComment = comments.find(c => 
              c.user.login === 'github-actions[bot]' && 
              c.body.includes('')
            );

            // 4. Update or Create
            if (botComment) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: botComment.id,
                body: body
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body: body
              });
            }